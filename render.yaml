services:
  - type: web
    name: glosarium-app
    runtime: node
    plan: free
    envVars:
      - key: SECURE_ENV
        sync: false
      - key: PORT
        value: 10000
      - key: SAFETY_PIN
        sync: false
      - key: POSTGRES_URL
        sync: false 
    buildCommand: bun run build && bun run migrate && rm -rf api ui
    startCommand: cd dist && bun index.js